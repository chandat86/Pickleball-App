<!DOCTYPE html>
<html lang="vi">
<head>
<!-- Pickleball Player Viewer v1.0 | 2026-05-26 | Standalone viewer for players/spectators -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Pickleball — Xem Giải Đấu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');

:root {
  --bg:#07101e; --bg2:#0d1b30; --bg3:#122040; --bg4:#172848;
  --bdr:#1c3456; --bdr2:#254878; --bdr3:#2e5a94;
  --ac:#0ea5e9; --ac2:#38bdf8; --ac3:#0284c7;
  --gn:#22c55e; --gn2:#16a34a; --gn3:rgba(34,197,94,.12);
  --or:#f59e0b; --or2:#d97706;
  --rd:#ef4444; --rd2:#dc2626;
  --pu:#a855f7; --cy:#06b6d4;
  --tx:#e8f0fe; --tx2:#94a3b8; --tx3:#64748b; --tx4:#475569;
  --fn:'Barlow',sans-serif;
  --fh:'Barlow Condensed',sans-serif;
  --r:10px; --r2:14px; --r3:20px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow-lg:0 16px 48px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 120% 60% at 50% -20%,rgba(14,165,233,.1) 0%,transparent 60%)}
::selection{background:rgba(14,165,233,.3)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes liveDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ─── LOGIN ─── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;padding:20px;
}
.login-wrap{width:100%;max-width:400px;animation:fadeUp .4s ease}
.login-logo{text-align:center;margin-bottom:28px}
.logo-icon{
  width:72px;height:72px;margin:0 auto 12px;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 8px 32px rgba(14,165,233,.4);
}
.logo-title{font-family:var(--fh);font-size:13px;font-weight:800;letter-spacing:3px;color:var(--ac);text-transform:uppercase}
.logo-sub{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--tx);letter-spacing:.5px;margin-top:3px}
.logo-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(34,197,94,.12);color:var(--gn);border:1px solid rgba(34,197,94,.25);
  font-size:10px;font-weight:800;letter-spacing:2px;padding:3px 10px;border-radius:20px;
  text-transform:uppercase;margin-top:6px;
}
.login-card{
  background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r3);
  padding:28px 24px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(14,165,233,.05);
}
.login-card h3{font-family:var(--fh);font-size:18px;font-weight:800;margin-bottom:4px}
.login-card p{font-size:12px;color:var(--tx3);margin-bottom:20px}
.fl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:5px}
.fi{
  width:100%;padding:12px 14px;background:var(--bg3);border:1.5px solid var(--bdr2);
  border-radius:var(--r);color:var(--tx);font-family:var(--fn);font-size:15px;outline:none;
  transition:border-color .15s,box-shadow .15s;margin-bottom:14px;
}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.fi::placeholder{color:var(--tx4)}
.btn-login{
  width:100%;padding:14px;font-family:var(--fh);font-size:16px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--ac3),var(--ac));color:#fff;border:none;
  border-radius:var(--r);cursor:pointer;transition:opacity .15s,transform .1s;
  box-shadow:0 4px 16px rgba(14,165,233,.35);
}
.btn-login:active{transform:scale(.98);opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;
  padding:10px 14px;font-size:13px;color:#fca5a5;margin-top:12px;display:none}

/* ─── TOP BAR ─── */
#topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(7,16,30,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 16px;height:56px;gap:12px;
}
.tb-logo{font-family:var(--fh);font-size:18px;font-weight:900;color:var(--ac);letter-spacing:.5px;flex-shrink:0}
.tb-sep{width:1px;height:24px;background:var(--bdr);flex-shrink:0}
.tb-giai{flex:1;min-width:0}
.tb-gname{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-gsub{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--rd);
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);padding:4px 9px;border-radius:20px;flex-shrink:0}
.tb-live .dot{width:6px;height:6px;background:var(--rd);border-radius:50%;animation:liveDot 1.2s ease-in-out infinite}
.tb-logout{background:none;border:1px solid var(--bdr);border-radius:8px;padding:5px 10px;
  color:var(--tx3);font-size:12px;cursor:pointer;font-family:var(--fn);white-space:nowrap;flex-shrink:0}
.tb-logout:hover{color:var(--tx);border-color:var(--bdr2)}

/* ─── NAV TABS ─── */
#navtabs{
  display:flex;gap:0;border-bottom:1px solid var(--bdr);
  background:var(--bg2);overflow-x:auto;scrollbar-width:none;
  position:sticky;top:56px;z-index:90;
}
#navtabs::-webkit-scrollbar{display:none}
.ntab{
  padding:11px 18px;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.3px;
  border:none;background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;margin-bottom:-1px;font-size:14px;
  transition:color .15s;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.ntab:hover{color:var(--tx)}
.ntab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ─── ND FILTER (nội dung) ─── */
#nd-filter-bar{
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;
}
#nd-filter-bar::-webkit-scrollbar{display:none}
.nd-chip{
  padding:5px 14px;font-size:12px;font-weight:700;border-radius:20px;white-space:nowrap;
  border:1.5px solid var(--bdr2);background:transparent;color:var(--tx3);cursor:pointer;
  font-family:var(--fn);transition:all .15s;flex-shrink:0;
}
.nd-chip:hover{color:var(--tx);border-color:var(--bdr3)}
.nd-chip.on{background:var(--ac3);border-color:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,.25)}

/* ─── MAIN CONTENT ─── */
#main{padding:14px;max-width:1100px;margin:0 auto;animation:fadeUp .3s ease}
.page{display:none}
.page.on{display:block}

/* ─── SECTION TITLE ─── */
.sec-title{
  font-family:var(--fh);font-size:20px;font-weight:900;letter-spacing:.3px;
  color:var(--tx);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-title span{font-size:13px;font-weight:600;color:var(--tx3);font-family:var(--fn);letter-spacing:0}

/* ─── LIVE CARDS ─── */
.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:20px}
@media(max-width:480px){.live-grid{grid-template-columns:1fr}}

.live-card{
  background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);
  overflow:hidden;animation:fadeUp .3s ease;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  border-top:3px solid var(--rd);
  transition:transform .15s,box-shadow .15s;
}
.live-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.lc-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:rgba(239,68,68,.06);border-bottom:1px solid rgba(239,68,68,.1);
}
.lc-live{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:var(--rd);letter-spacing:1px}
.lc-live .dot{width:5px;height:5px;background:var(--rd);border-radius:50%;animation:liveDot 1s infinite}
.lc-info{font-size:11px;color:var(--tx3);font-weight:600}
.lc-score{padding:14px 12px}
.lc-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.lc-team{text-align:center}
.lc-team-name{font-family:var(--fh);font-size:15px;font-weight:800;color:var(--tx);
  line-height:1.2;margin-bottom:4px}
.lc-snum{font-family:var(--fh);font-size:44px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc-snum.win{background:linear-gradient(135deg,var(--gn),#86efac);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc-vs{font-family:var(--fh);font-size:13px;font-weight:900;color:var(--tx3);
  padding:0 4px;text-align:center}
.lc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-top:1px solid var(--bdr);background:rgba(0,0,0,.15);
}
.lc-court{font-size:11px;color:var(--ac);font-weight:700}
.lc-rule{font-size:11px;color:var(--tx3)}
.lc-round{font-size:11px;color:var(--or);font-weight:600}

/* ─── BXH TABLE ─── */
.bxh-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);
  overflow:hidden;margin-bottom:14px;animation:fadeUp .3s ease}
.bxh-head{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg3);border-bottom:1px solid var(--bdr);cursor:pointer;
}
.bxh-head:hover{background:var(--bg4)}
.bxh-bang{font-family:var(--fh);font-size:16px;font-weight:800;flex:1}
.bxh-meta{font-size:11px;color:var(--tx3)}
.bxh-arrow{font-size:14px;color:var(--tx3);transition:transform .2s}
.bxh-arrow.open{transform:rotate(180deg)}
.bxh-body{display:none}
.bxh-body.open{display:block}
.bxh-tbl{width:100%;border-collapse:collapse;font-size:13px}
.bxh-tbl th{
  padding:8px 12px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  color:var(--tx3);text-align:center;background:rgba(0,0,0,.2);border-bottom:1px solid var(--bdr);
}
.bxh-tbl th:first-child,.bxh-tbl td:first-child{text-align:left;padding-left:14px;width:28px}
.bxh-tbl th:nth-child(2),.bxh-tbl td:nth-child(2){text-align:left;max-width:160px}
.bxh-tbl td{padding:10px 12px;border-bottom:1px solid rgba(27,50,85,.6);text-align:center;vertical-align:middle}
.bxh-tbl tr:last-child td{border-bottom:none}
.bxh-tbl tr.adv td{background:rgba(34,197,94,.05)}
.bxh-rank{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;font-weight:900;font-size:12px;
  font-family:var(--fh);
}
.bxh-rank.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.bxh-rank.r2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#000}
.bxh-rank.r3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.bxh-rank.rn{background:var(--bg3);color:var(--tx3)}
.bxh-team{font-weight:600;color:var(--tx);font-size:13px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.bxh-adv{font-size:10px;color:var(--gn);font-weight:700;margin-left:4px}
.badge-w{background:rgba(34,197,94,.15);color:var(--gn);font-weight:700;padding:2px 7px;border-radius:10px;font-size:11px}
.badge-l{background:rgba(239,68,68,.1);color:var(--rd);font-weight:700;padding:2px 7px;border-radius:10px;font-size:11px}

/* ─── LỊCH THI ĐẤU / KẾT QUẢ ─── */
.match-group{margin-bottom:16px;animation:fadeUp .3s ease}
.mg-title{
  font-family:var(--fh);font-size:13px;font-weight:800;letter-spacing:.5px;
  color:var(--tx3);text-transform:uppercase;padding:6px 0 8px;
  border-bottom:1px solid var(--bdr);margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.match-row{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:10px 14px;margin-bottom:6px;display:grid;
  grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;
  transition:background .12s;
}
.match-row:hover{background:var(--bg3)}
.match-row.done{border-left:3px solid var(--gn)}
.match-row.live{border-left:3px solid var(--rd);background:rgba(239,68,68,.04)}
.match-row.pending{border-left:3px solid var(--bdr)}
.mr-team{font-size:13px;font-weight:600;color:var(--tx)}
.mr-team.right{text-align:right}
.mr-team.winner{color:var(--gn);font-weight:800}
.mr-mid{text-align:center}
.mr-score{font-family:var(--fh);font-size:22px;font-weight:900;color:var(--tx);letter-spacing:1px}
.mr-score .w{color:var(--gn)}
.mr-vs{font-size:12px;color:var(--tx3);font-weight:700}
.mr-meta{font-size:10px;color:var(--tx3);margin-top:2px}
.mr-live-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:800;color:var(--rd);letter-spacing:.5px;
  background:rgba(239,68,68,.1);padding:1px 5px;border-radius:4px;margin-top:2px;
}
.mr-live-badge .dot{width:4px;height:4px;background:var(--rd);border-radius:50%;animation:liveDot 1s infinite}

/* ─── EMPTY / LOADING ─── */
.empty-state{
  text-align:center;padding:48px 20px;color:var(--tx3);
}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty-msg{font-size:14px}
.spin-wrap{display:flex;justify-content:center;padding:40px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--bdr2);
  border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}

/* ─── REFRESH ─── */
.refresh-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--bdr);
  font-size:11px;color:var(--tx3);position:sticky;top:calc(56px + 40px + 36px);z-index:80;
}
.refresh-bar.nd-shown{top:calc(56px + 40px + 36px + 36px)}
.rfbtn{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);
  border-radius:8px;color:var(--ac);font-size:11px;font-weight:700;cursor:pointer;
  font-family:var(--fn);transition:all .15s;
}
.rfbtn:hover{background:rgba(14,165,233,.2)}
.rfbtn:disabled{opacity:.5;cursor:not-allowed}
.update-time{font-size:11px;color:var(--tx3)}

/* ─── RESPONSIVE DESKTOP ─── */
@media(min-width:768px){
  #main{padding:20px}
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .lc-snum{font-size:56px}
  .bxh-tbl{font-size:14px}
  .match-row{padding:12px 18px}
  .mr-team{font-size:14px}
  .mr-score{font-size:26px}
}
@media(min-width:1100px){
  .live-grid{grid-template-columns:repeat(3,1fr)}
}

/* ─── SKELETON ─── */
.skel{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;
  border-radius:6px;
}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;
  padding:10px 18px;font-size:13px;color:var(--tx);z-index:999;opacity:0;
  pointer-events:none;transition:all .25s;white-space:nowrap;
  box-shadow:var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── DETAIL MODAL ─── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;
  align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r3);
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:fadeUp .2s ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
  border-bottom:1px solid var(--bdr)}
.mtt{font-family:var(--fh);font-size:18px;font-weight:800}
.mc{background:none;border:1px solid var(--bdr);border-radius:8px;width:32px;height:32px;
  color:var(--tx3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mc:hover{color:var(--tx);border-color:var(--bdr2)}
.mb{padding:16px 18px}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">🏓</div>
      <div class="logo-title">Referee Pickleball</div>
      <div class="logo-sub">DA NANG ®</div>
      <div class="logo-badge">👁 XEM GIẢI ĐẤU</div>
    </div>
    <div class="login-card">
      <h3>Đăng nhập</h3>
      <p>Sử dụng số điện thoại hoặc mã tài khoản được cấp</p>
      <label class="fl" style="display:none">Địa chỉ hệ thống</label>
      <input class="fi" id="gs-url" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" value="https://script.google.com/macros/s/AKfycbyLujKd3ONX6RZffuMaHSWKgGCGN6k6dAwp3kEEw05Shs6u4jctSpwe6-B7tw8yTCKL/exec" style="display:none">
      <label class="fl">Số điện thoại / Mã đăng nhập</label>
      <input class="fi" id="login-id" placeholder="0901234567" inputmode="tel" autocomplete="off"
        onkeydown="if(event.key==='Enter')doLogin()">
      <div id="login-err" class="login-err"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Đăng nhập →</button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
  <div id="topbar">
    <div class="tb-logo">🏓 PB</div>
    <div class="tb-sep"></div>
    <div class="tb-giai">
      <div class="tb-gname" id="tb-gname">—</div>
      <div class="tb-gsub" id="tb-gsub">—</div>
    </div>
    <div class="tb-live" id="tb-live" style="display:none">
      <div class="dot"></div>LIVE
    </div>
    <button class="tb-logout" onclick="doLogout()">Thoát</button>
  </div>

  <div id="navtabs">
    <button class="ntab on" data-tab="live" onclick="switchTab('live')">🔴 Đang đấu</button>
    <button class="ntab" data-tab="schedule" onclick="switchTab('schedule')">📋 Lịch đấu</button>
    <button class="ntab" data-tab="results" onclick="switchTab('results')">✅ Kết quả</button>
    <button class="ntab" data-tab="standings" onclick="switchTab('standings')">🏅 BXH</button>
  </div>

  <div id="nd-filter-bar" style="display:none"></div>

  <div id="refresh-bar-wrap" style="background:var(--bg2);border-bottom:1px solid var(--bdr);
    display:flex;align-items:center;justify-content:space-between;padding:7px 14px;
    position:sticky;top:96px;z-index:80">
    <span class="update-time" id="update-time">—</span>
    <button class="rfbtn" id="rf-btn" onclick="refreshAll()">↻ Làm mới</button>
  </div>

  <div id="debug-info" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
    padding:8px 14px;font-size:11px;color:#fca5a5;font-family:monospace;line-height:1.6"></div>

  <div id="main">
    <!-- Live tab -->
    <div class="page on" id="tab-live">
      <div id="live-content">
        <div class="spin-wrap"><div class="spin"></div></div>
      </div>
    </div>
    <!-- Schedule tab -->
    <div class="page" id="tab-schedule">
      <div id="schedule-content">
        <div class="spin-wrap"><div class="spin"></div></div>
      </div>
    </div>
    <!-- Results tab -->
    <div class="page" id="tab-results">
      <div id="results-content">
        <div class="spin-wrap"><div class="spin"></div></div>
      </div>
    </div>
    <!-- Standings tab -->
    <div class="page" id="tab-standings">
      <div id="standings-content">
        <div class="spin-wrap"><div class="spin"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let GS='https://script.google.com/macros/s/AKfycbyLujKd3ONX6RZffuMaHSWKgGCGN6k6dAwp3kEEw05Shs6u4jctSpwe6-B7tw8yTCKL/exec', USER_NAME='', USER_CODE='', USER_GIAI='', USER_ND='', USER_GIAI_LIST=[], USER_ND_LIST=[];
let _M=[], _R=[], _L=[], _T=null; // matches, results, live, tournament info
let _curTab='live', _curNd=''; // selected nd filter
let _liveTimer=null, _REFRESH_SEC=12;
let _lastUpdate=null;
let _allNds=[]; // all noidungs accessible to this user
let _giaiName=''; // resolved tournament name

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, dur=2500) {
  const t = $('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function fmtTime(ts) {
  if (!ts) return '';
  const d=new Date(ts);
  return d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}

function setUpdateTime() {
  _lastUpdate=new Date();
  $('update-time').textContent='Cập nhật: '+_lastUpdate.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ══════════════════════════════════════════════════
//  GAS API
// ══════════════════════════════════════════════════
async function gGet(params, timeout=12000) {
  const url = new URL(GS);
  Object.entries(params).forEach(([k,v])=>{ if(v!==undefined&&v!==null&&v!=='') url.searchParams.set(k,v); });
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeout);
  try {
    const r=await fetch(url.toString(),{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(timer);
    const j=await r.json();
    return j; // trả về full response, không lọc ok
  } catch(e) { clearTimeout(timer); return {}; }
}

// ══════════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════════
function loadSaved() {
  try {
    const s=localStorage.getItem('pb_player3');
    if (!s) return false;
    const j=JSON.parse(s);
    if (!j.u||!j.c) return false;
    GS=j.u; USER_NAME=j.n||''; USER_CODE=j.c;
    USER_GIAI=j.g||''; USER_ND=j.nd||'';
    $('gs-url').value=GS;
    return true;
  } catch(e){return false;}
}

async function doLogin() {
  const url=$('gs-url').value.trim();
  const id=$('login-id').value.trim();
  if(!url){showErr('Vui lòng nhập địa chỉ hệ thống'); return;}
  if(!id){showErr('Vui lòng nhập số điện thoại hoặc mã'); return;}

  // Auto-fix URL
  let gsUrl = url;
  if(!gsUrl.startsWith('http')) gsUrl='https://'+gsUrl;
  gsUrl=gsUrl.replace(/(\/exec)(\/.*)?$/,'$1').replace(/\/+$/,'');
  GS=gsUrl;
  $('gs-url').value=gsUrl;

  const btn=$('login-btn'); btn.disabled=true; btn.textContent='Đang đăng nhập...';
  hideErr();
  try {
    // Detect phone vs code
    const phone=id.replace(/\D/g,'');
    const isPhone=phone.length>=8&&phone.length<=12&&/^\d+$/.test(phone);

    // Dùng action=validate (cùng GAS handler với admin)
    const fetchUrl=gsUrl+'?action=validate&device=player-web&_t='+Date.now()
      +(isPhone?'&phone='+encodeURIComponent(phone):'&code='+encodeURIComponent(id.toUpperCase()));

    const r=await fetch(fetchUrl,{cache:'no-store'});
    if(!r.ok){showErr('Lỗi kết nối HTTP '+r.status); btn.disabled=false; btn.textContent='Đăng nhập →'; return;}

    const d=await r.json();
    if(!d.valid){
      showErr(d.reason||'Số điện thoại hoặc mã không đúng');
      btn.disabled=false; btn.textContent='Đăng nhập →';
      return;
    }
    const status=(d.statusRaw||'').toLowerCase();
    if(status==='khóa'||status==='disabled'){
      showErr('Tài khoản bị khóa');
      btn.disabled=false; btn.textContent='Đăng nhập →'; return;
    }
    // Store session
    USER_NAME=d.name||''; USER_CODE=d.code||'';
    USER_GIAI=d.giai||''; USER_ND=d.noidung||'';
    localStorage.setItem('pb_player3', JSON.stringify({u:gsUrl,c:USER_CODE,n:USER_NAME,g:USER_GIAI,nd:USER_ND}));
    localStorage.setItem('pb_gs_url', gsUrl);
    startApp();
  } catch(e){
    showErr('Lỗi kết nối: '+(e.message||'unknown'));
    btn.disabled=false; btn.textContent='Đăng nhập →';
  }
}

function showErr(msg){const e=$('login-err');e.textContent=msg;e.style.display='block';}
function hideErr(){$('login-err').style.display='none';}
function doLogout(){
  if(!confirm('Đăng xuất?')) return;
  localStorage.removeItem('pb_player3');
  stopAutoRefresh();
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  $('login-id').value='';
  const btn=$('login-btn'); btn.disabled=false; btn.textContent='Đăng nhập →';
}

// ══════════════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════════════
async function startApp() {
  $('login-screen').style.display='none';
  $('app').style.display='block';
  await loadAll();
  switchTab('live');
  startAutoRefresh();
}

function startAutoRefresh() {
  stopAutoRefresh();
  _liveTimer=setInterval(()=>{ refreshAll(true); }, _REFRESH_SEC*1000);
}
function stopAutoRefresh(){ if(_liveTimer){clearInterval(_liveTimer);_liveTimer=null;} }

async function refreshAll(silent=false) {
  const btn=$('rf-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  try {
    await loadAll();
    renderCurrentTab();
    if(!silent) toast('✅ Đã cập nhật');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='↻ Làm mới';}
  }
}

async function loadAll() {
  // ── Bước 1: Fetch TẤT CẢ tournaments (không cần auth) ──
  // Tìm tên giải thực tế để dùng làm param fetch data
  try {
    const td = await gGet({action:'tournaments'});
    if(td.rows?.length > 1) {
      const trows = td.rows.slice(1);
      const gUp = (USER_GIAI||'').trim().toUpperCase();

      // Tìm theo ID (col 0) hoặc tên (col 1), case-insensitive
      let found = null;
      if(gUp) {
        found = trows.find(r =>
          String(r[0]||'').trim().toUpperCase() === gUp ||
          String(r[1]||'').trim().toUpperCase() === gUp
        );
      }
      // Nếu không tìm được → lấy giải đầu tiên (player chỉ có 1 giải)
      if(!found && trows.length) found = trows[0];
      if(found) {
        _T = found;
        _giaiName = String(found[1]||'').trim(); // tên giải = col 1
      }
    }
  } catch(e) { console.warn('loadAll: fetch tournaments error', e); }

  // ── Bước 2: Dùng TÊN GIẢI (không phải ID) để fetch data ──
  // GAS makeFilter so sánh r[0] === giai param → phải là tên, không phải ID
  const giaiName = _giaiName || USER_GIAI || '';

  try {
    const [md, rd, ld] = await Promise.all([
      gGet({action:'matches', giai:giaiName}).catch(()=>({})),
      gGet({action:'results', giai:giaiName}).catch(()=>({})),
      gGet({action:'live', code:'all', giai:giaiName}).catch(()=>({}) ),
    ]);

    if(md.rows?.length > 1) _M = md.rows.slice(1);
    if(rd.rows?.length > 1) _R = rd.rows.slice(1);
    if(ld.rows?.length > 1) {
      _L = ld.rows.slice(1).filter(r => {
        const st = String(r[9]||'').toLowerCase();
        return st !== 'finished';
      });
    } else _L = [];

  } catch(e) { console.warn('loadAll: fetch data error', e); }

  buildNdList();
  renderTopBar();
  renderNdFilter();
  setUpdateTime();
  $('tb-live').style.display = _L.length ? 'flex' : 'none';

  // Debug: hiện thông tin resolve (xóa sau khi test xong)
  const dbgEl = document.getElementById('debug-info');
  if(dbgEl) {
    dbgEl.innerHTML = `<b>USER_GIAI:</b> ${esc(USER_GIAI)} | <b>_giaiName:</b> ${esc(_giaiName)} | <b>_M:</b> ${_M.length} trận | <b>_R:</b> ${_R.length} KQ | <b>_L:</b> ${_L.length} live | <b>_allNds:</b> ${_allNds.join(', ')||'(trống)'}`;
    dbgEl.style.display = 'block';
  }
}

function buildNdList() {
  // Get all noidungs from matches that match this user's giai (case-insensitive, ID or name)
  const allNds=[...new Set(_M
    .filter(m=>_giaiMatch(String(m[0]||'')))
    .map(m=>String(m[1]||'').trim()).filter(Boolean))];

  // Filter by user's noidung permission
  if(USER_ND&&USER_ND.trim()) {
    const allowed=USER_ND.split(',').map(s=>s.trim()).filter(Boolean);
    _allNds=allNds.filter(nd=>allowed.some(a=>nd.toLowerCase().includes(a.toLowerCase())||a.toLowerCase().includes(nd.toLowerCase())));
    if(!_allNds.length) _allNds=allowed; // fallback
  } else {
    _allNds=allNds;
  }

  // Set default curNd if not set or invalid
  if(!_curNd || !_allNds.includes(_curNd)) {
    _curNd=_allNds[0]||'';
  }
}

function renderTopBar() {
  const name=_T?String(_T[1]||''):USER_GIAI;
  const venue=_T?String(_T[2]||''):'';
  const startD=_T?String(_T[4]||''):'';
  const endD=_T?String(_T[5]||''):'';
  $('tb-gname').textContent=name||'Giải đấu';
  let sub=venue;
  if(startD){
    const f=d=>{try{const p=new Date(d);return p.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});}catch{return d;}};
    sub+=(sub?' · ':'')+f(startD)+(endD?' – '+f(endD):'');
  }
  $('tb-gsub').textContent=sub||USER_NAME;
}

function renderNdFilter() {
  const bar=$('nd-filter-bar');
  if(_allNds.length<=1){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML=_allNds.map(nd=>`
    <button class="nd-chip${nd===_curNd?' on':''}" onclick="selectNd('${esc(nd)}')">${esc(nd)}</button>
  `).join('');
}

function selectNd(nd) {
  _curNd=nd;
  renderNdFilter();
  renderCurrentTab();
}

// ══════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════
function switchTab(tab) {
  _curTab=tab;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='tab-'+tab));
  renderCurrentTab();
}

function renderCurrentTab() {
  switch(_curTab) {
    case 'live':      renderLive(); break;
    case 'schedule':  renderSchedule(); break;
    case 'results':   renderResults(); break;
    case 'standings': renderStandings(); break;
  }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function getGiaiName(){ return _giaiName||USER_GIAI; }

function _giaiMatch(val) {
  // So sánh giải: match tên hoặc ID, case-insensitive
  if(!USER_GIAI && !_giaiName) return true; // không filter nếu không có giai
  const v=String(val||'').trim().toUpperCase();
  if(!v) return false;
  const nameUp=(_giaiName||'').trim().toUpperCase();
  const idUp=(USER_GIAI||'').trim().toUpperCase();
  return v===nameUp||v===idUp;
}

function getFilteredMatches() {
  return _M.filter(m=>{
    const mg=String(m[0]||'');
    const mn=String(m[1]||'').trim();
    const giaiOk=_giaiMatch(mg);
    const ndOk=!_curNd||mn===_curNd;
    return giaiOk&&ndOk;
  });
}

function getResults() {
  // _R: [time,giai,nd,bang,code,teamA,teamB,sA,sB,winner,court,ref,rule]
  return _R.filter(r=>{
    const rg=String(r[1]||'');
    const rn=String(r[2]||'').trim();
    const giaiOk=_giaiMatch(rg);
    const ndOk=!_curNd||rn===_curNd;
    return giaiOk&&ndOk;
  });
}

// Build a map of match code → best result (last entry by time desc)
function buildResultMap() {
  const map=new Map();
  const res=getResults();
  res.forEach(r=>{
    const nd=String(r[2]||''), bang=String(r[3]||''), code=String(r[4]||'');
    const key=`${nd}|${bang}|${code}`;
    // Always overwrite — last wins (sorted by append time desc assumed)
    map.set(key,{sA:Number(r[7]||0),sB:Number(r[8]||0),winner:String(r[9]||''),time:String(r[0]||'')});
  });
  return map;
}

function isMatchDone(m, resMap) {
  if(!resMap) resMap=buildResultMap();
  const nd=String(m[1]||''), bang=String(m[2]||''), code=String(m[3]||'');
  return resMap.has(`${nd}|${bang}|${code}`);
}

function getLiveScore(m) {
  // LiveScore: [code, giai, nd, bang, teamA, teamB, sA, sB, court, status, updated, rule]
  // Match key = nd|bang|code (from LiveScore)
  const nd=String(m[1]||''), bang=String(m[2]||''), code=String(m[3]||'');
  // find in _L: _L[i][2]=nd, _L[i][3]=bang, _L[i][0]=code (match code)
  return _L.find(l=>String(l[0]||'')===code&&String(l[2]||'')===nd&&String(l[3]||'')===bang)||null;
}

// ══════════════════════════════════════════════════
//  RENDER LIVE
// ══════════════════════════════════════════════════
function renderLive() {
  const wrap=$('live-content');
  const matches=getFilteredMatches();
  const resMap=buildResultMap();

  // Get live matches: either from _L or from matches that have live data
  const liveCodes=new Set(_L.map(l=>String(l[0]||'')));

  const liveMatches=matches.filter(m=>{
    const code=String(m[3]||'');
    return liveCodes.has(code)&&!isMatchDone(m,resMap);
  });

  if(!liveMatches.length) {
    wrap.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🏓</div>
      <div class="empty-msg">Hiện không có trận nào đang thi đấu</div>
      <div style="font-size:12px;color:var(--tx3);margin-top:8px">Tự động cập nhật mỗi ${_REFRESH_SEC}s</div>
    </div>`;
    return;
  }

  wrap.innerHTML=`<div class="live-grid">${liveMatches.map(m=>{
    const ls=getLiveScore(m)||{};
    const sA=ls.sA!==undefined?ls.sA:'—', sB=ls.sB!==undefined?ls.sB:'—';
    const teamA=String(m[4]||'—'), teamB=String(m[7]||'—');
    const court=ls.court||String(m[8]||'');
    const rule=ls.rule||String(m[10]||'');
    const round=String(m[9]||'');
    const bang=String(m[2]||'');
    const aWin=typeof sA==='number'&&typeof sB==='number'&&sA>sB;
    const bWin=typeof sA==='number'&&typeof sB==='number'&&sB>sA;
    return `<div class="live-card">
      <div class="lc-header">
        <div class="lc-live"><div class="dot"></div>LIVE</div>
        <div class="lc-info">${esc(bang)}${round?' · '+esc(round):''}${_curNd?'':' · '+esc(String(m[1]||''))}</div>
      </div>
      <div class="lc-score">
        <div class="lc-teams">
          <div class="lc-team">
            <div class="lc-team-name">${esc(teamA)}</div>
          </div>
          <div>
            <div class="lc-vs" style="text-align:center">
              <span class="lc-snum${aWin?' win':''}">${sA}</span>
              <span style="font-size:18px;color:var(--tx3);margin:0 4px">–</span>
              <span class="lc-snum${bWin?' win':''}">${sB}</span>
            </div>
          </div>
          <div class="lc-team">
            <div class="lc-team-name">${esc(teamB)}</div>
          </div>
        </div>
      </div>
      <div class="lc-footer">
        <div class="lc-court">${court?'🏸 '+esc(court):''}</div>
        <div class="lc-round">${esc(round)}</div>
        <div class="lc-rule">${rule?'Chạm '+rule:''}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ══════════════════════════════════════════════════
//  RENDER SCHEDULE
// ══════════════════════════════════════════════════
function renderSchedule() {
  const wrap=$('schedule-content');
  const matches=getFilteredMatches();
  const resMap=buildResultMap();
  const liveCodes=new Set(_L.map(l=>String(l[0]||'')));

  // Only upcoming + live (not done)
  const pending=matches.filter(m=>!isMatchDone(m,resMap));

  if(!pending.length) {
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>
      <div class="empty-msg">Không có trận nào sắp diễn ra</div></div>`;
    return;
  }

  // Group by bang
  const byBang=new Map();
  pending.forEach(m=>{
    const bang=String(m[2]||'Khác');
    if(!byBang.has(bang)) byBang.set(bang,[]);
    byBang.get(bang).push(m);
  });

  wrap.innerHTML=[...byBang.entries()].map(([bang,ms])=>`
    <div class="match-group">
      <div class="mg-title">🏓 ${esc(bang)} <span style="font-weight:400;font-size:11px">${ms.length} trận</span></div>
      ${ms.map(m=>{
        const code=String(m[3]||'');
        const isLive=liveCodes.has(code);
        const ls=isLive?getLiveScore(m):null;
        const teamA=String(m[4]||'—'), teamB=String(m[7]||'—');
        const court=String(m[8]||''), round=String(m[9]||'');
        const sA=ls?.sA??'', sB=ls?.sB??'';
        return `<div class="match-row ${isLive?'live':'pending'}">
          <div class="mr-team">${esc(teamA)}</div>
          <div class="mr-mid">
            ${isLive?`<div class="mr-score"><span>${sA}</span><span style="color:var(--tx3);margin:0 3px;font-size:14px">–</span><span>${sB}</span></div>
              <div class="mr-live-badge"><div class="dot"></div>LIVE</div>`
            :`<div class="mr-vs">VS</div>`}
            <div class="mr-meta">${court?esc(court):''}${round?' · '+esc(round):''}</div>
          </div>
          <div class="mr-team right">${esc(teamB)}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════
//  RENDER RESULTS
// ══════════════════════════════════════════════════
function renderResults() {
  const wrap=$('results-content');
  const matches=getFilteredMatches();
  const resMap=buildResultMap();

  const done=matches.filter(m=>isMatchDone(m,resMap));

  if(!done.length) {
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">✅</div>
      <div class="empty-msg">Chưa có kết quả nào</div></div>`;
    return;
  }

  // Group by bang, sort so KO rounds are at end
  const KO_KEYS=['Tứ kết','Bán kết','Chung kết','Hạng 3','Vòng 16'];
  const isKo=n=>KO_KEYS.some(k=>n.startsWith(k)||n.includes(k));
  const byBang=new Map();
  done.forEach(m=>{
    const bang=String(m[2]||'Khác');
    if(!byBang.has(bang)) byBang.set(bang,[]);
    byBang.get(bang).push(m);
  });

  // Sort bangs: pool first, KO last
  const sorted=[...byBang.entries()].sort((a,b)=>{
    const aKo=isKo(a[0]),bKo=isKo(b[0]);
    if(aKo&&!bKo)return 1; if(!aKo&&bKo)return -1;
    return a[0].localeCompare(b[0],undefined,{numeric:true});
  });

  wrap.innerHTML=sorted.map(([bang,ms])=>`
    <div class="match-group">
      <div class="mg-title">${isKo(bang)?'🏆':''} ${esc(bang)} <span style="font-weight:400;font-size:11px">${ms.length} trận</span></div>
      ${ms.map(m=>{
        const nd=String(m[1]||''), bgn=String(m[2]||''), code=String(m[3]||'');
        const res=resMap.get(`${nd}|${bgn}|${code}`);
        const sA=res?.sA??0, sB=res?.sB??0;
        const teamA=String(m[4]||'—'), teamB=String(m[7]||'—');
        const aWin=sA>sB, bWin=sB>sA;
        const court=String(m[8]||''), round=String(m[9]||'');
        return `<div class="match-row done">
          <div class="mr-team${aWin?' winner':''}">${esc(teamA)}</div>
          <div class="mr-mid">
            <div class="mr-score"><span class="${aWin?'w':''}">${sA}</span><span style="color:var(--tx3);margin:0 3px;font-size:14px">–</span><span class="${bWin?'w':''}">${sB}</span></div>
            <div class="mr-meta">${court?esc(court):''}${round?' · '+esc(round):''}</div>
          </div>
          <div class="mr-team right${bWin?' winner':''}">${esc(teamB)}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════
//  RENDER STANDINGS (BXH)
// ══════════════════════════════════════════════════
function renderStandings() {
  const wrap=$('standings-content');
  const gName=getGiaiName();
  const resData=getResults();

  // Only pool matches (not KO)
  const KO_KEYS=['Tứ kết','Bán kết','Chung kết','Hạng 3','Vòng 16','BK','TK','CK','H3','V16'];
  const isKo=n=>KO_KEYS.some(k=>n.startsWith(k)||n.includes(k));

  // Group results by bang (only pool)
  const byBang=new Map();
  resData.filter(r=>!isKo(String(r[3]||''))).forEach(r=>{
    const bang=String(r[3]||'');
    if(!bang) return;
    if(!byBang.has(bang)) byBang.set(bang,[]);
    byBang.get(bang).push(r);
  });

  if(!byBang.size) {
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">🏅</div>
      <div class="empty-msg">Chưa có kết quả để xếp hạng</div></div>`;
    return;
  }

  // Sort bangs alphabetically
  const sortedBangs=[...byBang.keys()].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));

  // Number of advancement slots (top 2 per bang typically, or based on bang count)
  const totalBangs=sortedBangs.length;
  const advSlots=totalBangs>=4?2:totalBangs>=2?2:1;

  wrap.innerHTML=sortedBangs.map((bang,bi)=>{
    const rows=byBang.get(bang);
    // Compute standings
    const ts={};
    rows.forEach(r=>{
      const tA=String(r[5]||''), tB=String(r[6]||'');
      const sA=Number(r[7]||0), sB=Number(r[8]||0);
      [tA,tB].filter(Boolean).forEach(t=>{
        if(!ts[t])ts[t]={team:t,won:0,lost:0,pf:0,pa:0,played:0};
      });
      if(!tA||!tB)return;
      ts[tA].played++; ts[tB].played++;
      ts[tA].pf+=sA; ts[tA].pa+=sB;
      ts[tB].pf+=sB; ts[tB].pa+=sA;
      if(sA>sB){ts[tA].won++;ts[tB].lost++;}
      else if(sB>sA){ts[tB].won++;ts[tA].lost++;}
    });

    const standings=Object.values(ts).sort((a,b)=>{
      if(b.won!==a.won)return b.won-a.won;
      const aDiff=a.pf-a.pa, bDiff=b.pf-b.pa;
      if(bDiff!==aDiff)return bDiff-aDiff;
      return b.pf-a.pf;
    });

    const rankClass=i=>i===0?'r1':i===1?'r2':i===2?'r3':'rn';

    return `<div class="bxh-card">
      <div class="bxh-head" onclick="toggleBxh(this)">
        <div class="bxh-bang">${esc(bang)}</div>
        <div class="bxh-meta">${standings.length} đội · ${rows.length} trận</div>
        <div class="bxh-arrow open">▾</div>
      </div>
      <div class="bxh-body open">
        <table class="bxh-tbl">
          <thead><tr>
            <th>#</th><th>Đội</th><th>T</th><th>T/B</th><th>PT</th><th>PP</th><th>Hiệu</th>
          </tr></thead>
          <tbody>
            ${standings.map((s,i)=>{
              const adv=i<advSlots;
              return `<tr${adv?' class="adv"':''}>
                <td><span class="bxh-rank ${rankClass(i)}">${i+1}</span></td>
                <td><span class="bxh-team">${esc(s.team)}</span>${adv?'<span class="bxh-adv">▲</span>':''}</td>
                <td>${s.played}</td>
                <td><span class="badge-w">${s.won}</span> <span class="badge-l">${s.lost}</span></td>
                <td>${s.pf}</td><td>${s.pa}</td>
                <td style="color:${s.pf-s.pa>=0?'var(--gn)':'var(--rd)'};font-weight:700">${s.pf-s.pa>=0?'+':''}${s.pf-s.pa}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleBxh(head) {
  const body=head.nextElementSibling;
  const arrow=head.querySelector('.bxh-arrow');
  const open=body.classList.toggle('open');
  arrow.classList.toggle('open',open);
}
